<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#060a12">
  <title>Cambiar clave - Jovi System</title>
  <link rel="icon" href="favicon-32.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <section class="login-screen" id="loginScreen">
    <div class="login-card">
      <div class="brand login-brand">
        <div class="brand-mark"><img src="logo.png" alt="Jovi System"></div>
        <div>
          <strong>Jovi System</strong>
          <span>Crear clave nueva</span>
        </div>
      </div>

      <div id="checkingState">
        <p class="muted" style="text-align:center;">Verificando el enlace...</p>
      </div>

      <form id="resetForm" style="display:none;">
        <label>Clave nueva<input id="newPassword" type="password" minlength="6" required placeholder="Minimo 6 caracteres"></label>
        <label>Confirmar clave<input id="confirmPassword" type="password" minlength="6" required></label>
        <button class="primary-btn full" type="submit">Guardar clave nueva</button>
      </form>

      <div id="invalidState" style="display:none;">
        <p class="muted" style="text-align:center;">Este enlace ya no es valido o expiro. Pide uno nuevo desde la pantalla de inicio de sesion con "Olvide mi clave".</p>
        <a href="index.html" class="ghost-btn full" style="display:block;text-align:center;text-decoration:none;margin-top:10px;">Volver al inicio</a>
      </div>

      <div id="successState" style="display:none;">
        <p class="muted" style="text-align:center;">Tu clave fue actualizada. Ya puedes entrar con ella.</p>
        <a href="index.html" class="primary-btn full" style="display:block;text-align:center;text-decoration:none;margin-top:10px;">Ir a iniciar sesion</a>
      </div>
    </div>
  </section>

  <div class="toast" id="toast" role="status"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script>
    const sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
    const toast = document.getElementById("toast");
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 3000);
    }

    function showState(id) {
      ["checkingState", "resetForm", "invalidState", "successState"].forEach(sid => {
        document.getElementById(sid).style.display = sid === id ? (sid === "resetForm" ? "block" : "block") : "none";
      });
    }

    // El link del correo trae un token que supabase-js detecta solo en la URL
    // y dispara este evento cuando ya hay sesion de recuperacion lista.
    let ready = false;
    sb.auth.onAuthStateChange((event) => {
      if (event === "PASSWORD_RECOVERY") {
        ready = true;
        showState("resetForm");
      }
    });

    // Respaldo: si el evento no llega pero ya hay sesion activa (algunos
    // navegadores procesan el hash antes de que el listener quede armado).
    setTimeout(async () => {
      if (ready) return;
      const { data } = await sb.auth.getSession();
      if (data.session) { showState("resetForm"); } else { showState("invalidState"); }
    }, 1800);

    document.getElementById("resetForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const pass1 = document.getElementById("newPassword").value;
      const pass2 = document.getElementById("confirmPassword").value;
      if (pass1 !== pass2) { showToast("Las claves no coinciden."); return; }
      const { error } = await sb.auth.updateUser({ password: pass1 });
      if (error) { showToast("No se pudo actualizar la clave."); return; }
      await sb.auth.signOut();
      showState("successState");
    });
  </script>
</body>
</html>
