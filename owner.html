<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#060a12">
  <title>Panel del dueño - Jovi System</title>
  <link rel="icon" href="favicon-32.png" type="image/png">
  <link rel="apple-touch-icon" href="logo-180.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { padding: 20px 16px 40px !important; max-width: 760px; margin: 0 auto; }
    .owner-card { margin-bottom: 18px; }
    table { min-width: 100%; }
  </style>
</head>
<body>
  <section class="login-screen" id="loginScreen" style="min-height:60vh;">
    <div class="login-card">
      <div class="brand login-brand"><div class="brand-mark"><img src="logo.png" alt="Jovi System"></div><div><strong>Jovi System</strong><span>Panel del dueño &middot; solo administracion</span></div></div>
      <form id="loginForm">
        <label>Correo<input id="loginEmail" type="email" required></label>
        <label>Clave<input id="loginPass" type="password" required></label>
        <button class="primary-btn full" type="submit">Entrar</button>
      </form>
      <p class="muted login-help"><button class="link-btn" id="forgotPasswordLink" type="button" style="padding:0;">Olvide mi clave</button></p>
    </div>
  </section>

  <div class="modal" id="forgotPasswordModal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="forgotPasswordTitle">
      <div class="modal-head"><h2 id="forgotPasswordTitle">Recuperar clave</h2><button class="icon-btn" data-close-modal type="button" aria-label="Cerrar">x</button></div>
      <p class="muted" style="margin-bottom:14px;">Te enviaremos un enlace a tu correo para crear una clave nueva.</p>
      <form id="forgotPasswordForm">
        <label>Correo electronico<input id="forgotPasswordEmail" type="email" required></label>
        <button class="primary-btn full" type="submit">Enviar enlace</button>
      </form>
    </div>
  </div>

  <main id="ownerApp" style="display:none;">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark"><img src="logo.png" alt="Jovi System"></div>
        <div><p class="eyebrow" style="margin:0;">Plataforma</p><strong style="font-size:20px;">Empresas clientes</strong></div>
      </div>
      <button class="ghost-btn" id="logoutBtn" type="button">Salir</button>
    </header>

    <section class="panel owner-card">
      <h2>Nueva empresa</h2>
      <form id="companyForm">
        <label>Nombre de la empresa<input id="companyName" required placeholder="Ej. Prestamos Lopez"></label>
        <div class="form-row">
          <label>Correo del administrador<input id="adminEmail" type="email" required></label>
          <label>Nombre del administrador<input id="adminUsername" required></label>
        </div>
        <label>Clave inicial<input id="adminPass" type="password" minlength="6" required placeholder="Minimo 6 caracteres"></label>
        <button class="primary-btn full" type="submit">Crear empresa y usuario admin</button>
      </form>
    </section>

    <section class="panel">
      <h2>Empresas existentes</h2>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Empresa</th><th>Creada</th><th>Accion</th></tr></thead>
          <tbody id="companiesTable"></tbody>
        </table>
      </div>
    </section>
  </main>

  <div class="modal" id="editCompanyModal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="editCompanyTitle">
      <div class="modal-head"><h2 id="editCompanyTitle">Editar empresa</h2><button class="icon-btn" data-close-modal type="button" aria-label="Cerrar">x</button></div>
      <form id="editCompanyForm">
        <input id="editCompanyId" type="hidden">
        <label>Nombre de la empresa<input id="editCompanyName" required></label>
        <label>Logo del negocio
          <div class="button-row">
            <div class="brand-mark" style="width:56px;height:56px;"><img id="editCompanyLogoPreview" src="logo.png" alt="Logo"></div>
            <label class="file-btn">Subir logo<input id="editCompanyLogoInput" type="file" accept="image/png,image/jpeg,image/webp,image/svg+xml"></label>
          </div>
        </label>
        <button class="primary-btn full" type="submit">Guardar cambios</button>
      </form>
    </div>
  </div>

  <div class="toast" id="toast" role="status"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script>
    const sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
    let session = null;
    const toast = document.getElementById("toast");

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 3000);
    }

    function escapeHtml(value) {
      return String(value ?? "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;");
    }

    let companiesCache = [];

    async function loadCompanies() {
      const { data, error } = await sb.from("companies").select("*").order("created_at", { ascending: false });
      if (error) { showToast("No se pudo cargar la lista (¿tu cuenta es 'owner'?)."); return; }
      companiesCache = data || [];
      document.getElementById("companiesTable").innerHTML = companiesCache.length
        ? companiesCache.map(c => `<tr>
            <td>
              <div style="display:flex;align-items:center;gap:10px;">
                <div class="brand-mark" style="width:34px;height:34px;flex-shrink:0;"><img src="${c.logo_url ? escapeHtml(c.logo_url) : "logo.png"}" alt=""></div>
                <span>${escapeHtml(c.name)}</span>
              </div>
            </td>
            <td>${new Date(c.created_at).toLocaleDateString("es-DO")}</td>
            <td>
              <div class="action-row" style="margin-top:0;">
                <button class="ghost-btn compact-btn" type="button" data-edit-company="${c.id}">Editar</button>
                <button class="danger-btn compact-btn" type="button" data-delete-company="${c.id}">Eliminar</button>
              </div>
            </td>
          </tr>`).join("")
        : `<tr><td colspan="3">Aun no hay empresas.</td></tr>`;
    }

    async function handleSession(s) {
      session = s;
      document.getElementById("loginScreen").style.display = "none";
      document.getElementById("ownerApp").style.display = "block";
      await loadCompanies();
    }

    document.getElementById("forgotPasswordLink").addEventListener("click", () => {
      document.getElementById("forgotPasswordModal").classList.add("open");
    });
    document.getElementById("forgotPasswordForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("forgotPasswordEmail").value.trim();
      const redirectTo = `${location.origin}${location.pathname.replace(/owner\.html$/, "")}reset-password.html`;
      const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo });
      if (error) { showToast("No se pudo enviar el correo."); return; }
      closeModals();
      showToast("Si el correo existe, te llegara un enlace para cambiar tu clave.");
    });

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPass").value;
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      if (error || !data.session) { showToast("Correo o clave incorrectos."); return; }
      await handleSession(data.session);
    });

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await sb.auth.signOut();
      location.reload();
    });

    document.getElementById("companyForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const companyName = document.getElementById("companyName").value.trim();
      const email = document.getElementById("adminEmail").value.trim();
      const username = document.getElementById("adminUsername").value.trim();
      const password = document.getElementById("adminPass").value;

      const res = await fetch(`${window.SUPABASE_URL}/functions/v1/manage-user`, {
        method: "POST",
        headers: { "Content-Type": "application/json", Authorization: `Bearer ${session.access_token}` },
        body: JSON.stringify({ action: "create_company", companyName, email, password, username })
      });
      const result = await res.json();
      if (result.error) { showToast(result.error); return; }
      e.target.reset();
      await loadCompanies();
      showToast(`Empresa creada. Entrega a tu cliente: ${email} / la clave que escribiste.`);
    });

    function closeModals() {
      document.querySelectorAll(".modal").forEach(modal => { modal.classList.remove("open"); modal.setAttribute("aria-hidden", "true"); });
    }

    document.querySelectorAll("[data-close-modal]").forEach(btn => btn.addEventListener("click", closeModals));
    document.querySelectorAll(".modal").forEach(modal => modal.addEventListener("click", e => { if (e.target === modal) closeModals(); }));

    document.getElementById("companiesTable").addEventListener("click", async (e) => {
      const editId = e.target.dataset.editCompany;
      const deleteId = e.target.dataset.deleteCompany;

      if (editId) {
        const company = companiesCache.find(c => c.id === editId);
        if (!company) return;
        document.getElementById("editCompanyId").value = company.id;
        document.getElementById("editCompanyName").value = company.name;
        document.getElementById("editCompanyLogoPreview").src = company.logo_url || "logo.png";
        document.getElementById("editCompanyModal").classList.add("open");
        document.getElementById("editCompanyModal").setAttribute("aria-hidden", "false");
      }

      if (deleteId) {
        const company = companiesCache.find(c => c.id === deleteId);
        if (!company) return;
        if (!confirm(`Eliminar "${company.name}" permanentemente? Se borraran sus usuarios, clientes, prestamos y pagos. Esto no se puede deshacer.`)) return;
        const res = await fetch(`${window.SUPABASE_URL}/functions/v1/manage-user`, {
          method: "POST",
          headers: { "Content-Type": "application/json", Authorization: `Bearer ${session.access_token}` },
          body: JSON.stringify({ action: "delete_company", companyId: deleteId })
        });
        const result = await res.json();
        if (result.error) { showToast(result.error); return; }
        await loadCompanies();
        showToast("Empresa eliminada.");
      }
    });

    document.getElementById("editCompanyLogoInput").addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (file) document.getElementById("editCompanyLogoPreview").src = URL.createObjectURL(file);
    });

    document.getElementById("editCompanyForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const id = document.getElementById("editCompanyId").value;
      const name = document.getElementById("editCompanyName").value.trim();
      const file = document.getElementById("editCompanyLogoInput").files[0];
      const updates = { name };

      if (file) {
        const path = `${id}/logo-${Date.now()}.${file.name.split(".").pop()}`;
        const { error: uploadError } = await sb.storage.from("company-logos").upload(path, file, { upsert: true });
        if (uploadError) { showToast("No se pudo subir el logo."); return; }
        updates.logo_url = sb.storage.from("company-logos").getPublicUrl(path).data.publicUrl;
      }

      const { error } = await sb.from("companies").update(updates).eq("id", id);
      if (error) { showToast("No se pudo guardar (revisa que tu cuenta sea 'owner')."); return; }
      closeModals();
      document.getElementById("editCompanyLogoInput").value = "";
      await loadCompanies();
      showToast("Empresa actualizada.");
    });

    sb.auth.getSession().then(({ data }) => { if (data.session) handleSession(data.session); });
  </script>
</body>
</html>
